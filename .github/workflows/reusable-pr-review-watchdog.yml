name: PR Review Swarm Watchdog (reusable)

on:
  workflow_call: {}

concurrency:
  group: pr-review-swarm-watchdog-${{ github.repository }}
  cancel-in-progress: true

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: write
      actions: read
    steps:
      # See reusable-pr-review.yml's NOTE — replace with the real org/repo and
      # the pinned commit SHA you trust before using this workflow.
      - uses: dustPyrotechnic/pr-review-swarm/action@c156a5069e40563c262d448bfcf2a616e067f291
        with:
          entrypoint: watchdog
          github_token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
